<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
  #cards {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
  }
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 28px 34px;
    min-width: 240px;
    text-align: center;
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-4px); }
  .card h2 { font-size: 1.2rem; margin-bottom: 12px; font-weight: 400; }
  .temp { font-size: 3rem; font-weight: 200; }
  .details { margin-top: 10px; font-size: 0.85rem; opacity: 0.75; }

  /* Button rows */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
    margin-bottom: 24px;
  }
  .btn-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: #fff;
    padding: 14px 28px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn:hover {
    background: rgba(255,255,255,0.22);
    transform: translateY(-2px);
  }
  .btn:active { transform: translateY(0); }

  #updated {
    margin-top: 10px;
    font-size: 0.8rem;
    opacity: 0.5;
  }

  /* Bday overlay */
  #bday-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,30,0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
    overflow-y: auto;
    padding: 40px 20px;
  }
  #bday-overlay.active { display: flex; flex-direction: column; align-items: center; }
  #bday-overlay h2 { font-weight: 300; margin-bottom: 8px; }
  #bday-overlay .sub { font-size: 0.9rem; opacity: 0.6; margin-bottom: 20px; }
  #bday-close {
    position: fixed;
    top: 16px;
    right: 24px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 1.5rem;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 101;
  }
  #bday-close:hover { background: rgba(255,255,255,0.3); }
  #year-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 8px;
    max-width: 800px;
    width: 100%;
  }
  .year-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    padding: 10px 4px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .year-btn:hover {
    background: rgba(255,255,255,0.22);
    transform: translateY(-2px);
  }
</style>
</head>
<body>
<h1>Weather Dashboard</h1>
<div id="cards">
  <div class="card" id="nyc">
    <h2>New York City</h2>
    <div class="temp">--</div>
    <div class="details"></div>
  </div>
  <div class="card" id="medina">
    <h2>Medina, OH</h2>
    <div class="temp">--</div>
    <div class="details"></div>
  </div>
</div>

<div class="buttons">
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;">
    <select id="place-select" class="btn" style="appearance:auto;text-align:center;">
      <option value="cleveland,oh">Cleveland</option>
      <option value="clearfield,pa">Clearfield, PA</option>
      <option value="freehold,nj">Freehold, NJ</option>
    </select>
    <button class="btn" onclick="goToWeather()">Go to weather for this place</button>
  </div>
  <button class="btn" onclick="window.open('https://www.google.com/search?q=What%27s+lucky+for+me+today%3F','_blank')">I Feel Lucky</button>
  <button class="btn" onclick="window.open('https://www.nytimes.com/section/todayspaper','_blank')">It Hasn't Been My Day</button>
  <button class="btn" onclick="openBdayOverlay()">On This Day On Bday</button>
</div>

<div id="bday-overlay">
  <button id="bday-close" onclick="closeBdayOverlay()">&times;</button>
  <h2>On This Day In History</h2>
  <p class="sub" id="bday-date"></p>
  <div id="year-grid"></div>
</div>

<p id="updated"></p>

<script>
const cities = [
  { id: 'nyc', name: 'New York City', lat: 40.7128, lon: -74.0060 },
  { id: 'medina', name: 'Medina, OH', lat: 41.1382, lon: -81.8637 }
];

async function fetchWeather() {
  for (const city of cities) {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true&temperature_unit=fahrenheit`;
      const res = await fetch(url);
      const data = await res.json();
      const w = data.current_weather;
      const card = document.getElementById(city.id);
      card.querySelector('.temp').textContent = `${Math.round(w.temperature)}°F`;
      card.querySelector('.details').textContent = `Wind ${w.windspeed} mph · Code ${w.weathercode}`;
    } catch (e) {
      const card = document.getElementById(city.id);
      card.querySelector('.temp').textContent = 'Error';
    }
  }
  document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

fetchWeather();
setInterval(fetchWeather, 300000);

// Go to weather for selected place
function goToWeather() {
  const place = document.getElementById('place-select').value;
  window.open('https://www.google.com/search?q=weather+' + encodeURIComponent(place), '_blank');
}

// On This Day On Bday
function openBdayOverlay() {
  const overlay = document.getElementById('bday-overlay');
  const grid = document.getElementById('year-grid');
  const now = new Date();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('bday-date').textContent = `${monthNames[now.getMonth()]} ${now.getDate()} — pick a birth year`;
  grid.innerHTML = '';
  for (let y = 1900; y <= 2026; y++) {
    const btn = document.createElement('button');
    btn.className = 'year-btn';
    btn.textContent = y;
    btn.onclick = function() {
      const query = encodeURIComponent(`interesting events on ${monthNames[now.getMonth()]} ${now.getDate()} ${y}`);
      window.open('https://www.google.com/search?q=' + query, '_blank');
    };
    grid.appendChild(btn);
  }
  overlay.classList.add('active');
}

function closeBdayOverlay() {
  document.getElementById('bday-overlay').classList.remove('active');
}
</script>
</body>
</html>
